name: Build ApolloSMP
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build the plugin
        run: mvn -B package
      - name: Upload the finished jar
        uses: actions/upload-artifact@v4
        with:
          name: ApolloSMP-plugin
          path: target/ApolloSMP.jar
          if-no-files-found: error
